server {
    listen 80;
    server_name habitsline.ru www.habitsline.ru;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name habitsline.ru www.habitsline.ru;

    ssl_certificate /etc/letsencrypt/live/habitsline.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/habitsline.ru/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
    }
}