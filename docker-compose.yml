version: "3.9"

networks:
  dev:

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Oo332211oo
      POSTGRES_DB: habits_tracker
    networks:
      - dev

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://user:pass@db:5432/habits
    depends_on:
      - db
    networks:
      - dev

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    networks:
      - dev